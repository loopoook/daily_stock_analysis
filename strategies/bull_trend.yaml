# Default Bull Trend Strategy / 默认多头趋势

name: bull_trend
display_name: 默认多头趋势
description: 默认个股分析优先策略，识别多头排列、趋势延续与回踩低吸机会。
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [趋势, 趋势分析, 多头趋势]
default_active: true
default_router: true
default_priority: 10
market_regimes: [trending_up]

instructions: |
  **默认多头趋势（Default Bull Trend Strategy）**

  适用场景：
  - 常规个股分析的默认策略。
  - 优先寻找“趋势向上 + 风险可控 + 不追高”的机会。

  分析框架：

  1. **趋势确认（优先级最高）**
     - 使用 `analyze_trend` 判断 MA5/MA10/MA20 排列。
     - MA5 >= MA10 >= MA20 且 MA20 斜率向上，视为多头结构。
     - 若价格显著跌破 MA20，则降低看多权重。

  2. **RSI动能过滤（第二层确认）**
     - 从 `analyze_trend` 读取 `rsi_6`、`rsi_12`、`rsi_status`。
     - **做多确认**：`rsi_6` 在 45-70 区间（有动能但未超买），`rsi_12` > 45。
     - **超买警戒**：`rsi_6` > 75，不追高，等待回调再评估。
     - **超卖利空**：`rsi_6` < 30 且 `ma_alignment` 偏空，降低多头权重。
     - 纯多头趋势中 RSI 轻度超买（75-80）可接受，但须同步缩量。

  3. **MACD动能确认（第三层确认）**
     - 从 `analyze_trend` 读取 `macd_dif`、`macd_dea`、`macd_bar`、`macd_signal`。
     - **理想状态**：DIF > DEA（金叉状态），MACD柱由负转正或持续扩张。
     - **弱化买入**：MACD 柱持续缩短（动能衰减），即使价格创新高也需谨慎。
     - **死叉排除**：`macd_signal` 为 dead_cross 时，仅在极度超卖配合底背驰时例外。
     - MACD 零轴上方金叉比零轴下方金叉信号更强。

  4. **位置与节奏**
     - 优先”回踩不破”而非”高位追涨”。
     - 当价格距离 MA5/MA10 过远时，提示等待回踩。
     - 放量突破有效阻力时可提高胜率评级。

  5. **量价验证**
     - 使用 `get_daily_history` 检查突破日/反弹日是否放量。
     - 缩量上涨需谨慎，放量滞涨需警惕分歧。

  6. **综合评估逻辑**
     - **强买入**：多头排列 + RSI 45-70 + MACD 零轴上方金叉 + 量价配合。
     - **标准买入**：多头排列 + RSI 中性 + MACD 金叉（零轴附近或以下）。
     - **观望**：均线排列不明确，或 RSI/MACD 出现矛盾信号。
     - **减仓**：跌破 MA20，且 MACD 死叉，RSI 跌破 50。

  7. **交易建议输出**
     - 输出明确的”买入/观望/减仓”倾向及触发条件。
     - 必须给出止损参考（如 MA20 下方或结构低点）。
     - 若无清晰优势，明确写”暂不出手”，避免过度交易。

  评分调整建议：
  - 多头排列 + 趋势强度良好：`sentiment_score +12`
  - RSI 45-70 多头区间确认：`sentiment_score +6`
  - MACD 零轴上方金叉：`sentiment_score +8`
  - MACD 零轴下方金叉（弱信号）：`sentiment_score +4`
  - 回踩关键均线后企稳：`sentiment_score +8`
  - 放量突破关键阻力：`sentiment_score +10`
  - RSI > 75 超买：`sentiment_score -6`（追高风险）
  - MACD 死叉：`sentiment_score -8`
  - 跌破 MA20 或趋势转弱：`sentiment_score -12`
